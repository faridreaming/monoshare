<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/src/style.css" />

    <title>monoshare</title>
  </head>
  <body class="grid h-dvh grid-rows-[auto_1fr] overflow-hidden">
    <a
      href="#main-content"
      class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 z-50 btn btn-primary"
    >
      Skip to Content
    </a>

    <header class="border-b border-base-300 bg-base-100 shadow-sm">
      <nav class="navbar px-4" aria-label="Main navigation">
        <div class="navbar-start gap-4">
          <div class="dropdown block md:hidden">
            <button
              tabindex="0"
              class="btn btn-ghost btn-square"
              aria-label="Open menu"
              aria-haspopup="true"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="h-5 w-5"
                aria-hidden="true"
              >
                <path d="M4 5h16" />
                <path d="M4 12h16" />
                <path d="M4 19h16" />
              </svg>
            </button>
            <ul
              tabindex="-1"
              class="menu dropdown-content bg-base-200 rounded-box z-50 mt-3 w-52 p-2 shadow"
            >
              <li>
                <a href="/">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="lucide lucide-house-icon lucide-house h-4 w-4 opacity-70"
                  >
                    <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8" />
                    <path
                      d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"
                    />
                  </svg>
                  Home</a
                >
              </li>
              <li>
                <a href="#/my-monos">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="lucide lucide-book-icon lucide-book h-4 w-4 opacity-70"
                  >
                    <path
                      d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a1 1 0 0 1 0-5H20"
                    />
                  </svg>
                  <span><em class="font-bold">mono</em> Saya</span></a
                >
              </li>
            </ul>
          </div>

          <ul class="menu menu-horizontal px-1 gap-2 hidden md:flex">
            <li>
              <a href="/">
                <img
                  src="/favicon.svg"
                  alt=""
                  aria-hidden="true"
                  class="h-5 w-5"
                />
                <span translate="no"><em class="font-bold">mono</em>share</span>
              </a>
            </li>
            <li>
              <a href="/">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="lucide lucide-house-icon lucide-house h-4 w-4 opacity-70"
                >
                  <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8" />
                  <path
                    d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"
                  />
                </svg>
                Home</a
              >
            </li>
            <li>
              <a href="#/my-monos">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="lucide lucide-book-icon lucide-book h-4 w-4 opacity-70"
                >
                  <path
                    d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a1 1 0 0 1 0-5H20"
                  />
                </svg>
                <span><em class="font-bold">mono</em> Saya</span></a
              >
            </li>
          </ul>
        </div>

        <a href="/" class="navbar-center gap-2 inline-flex text-sm md:hidden">
          <img src="/favicon.svg" alt="" aria-hidden="true" class="h-5 w-5" />
          <span translate="no"><em class="font-bold">mono</em>share</span>
        </a>

        <div class="navbar-end">
          <button id="logout-button" class="btn btn-error gap-2 btn-xs">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-log-out-icon lucide-log-out h-3 w-3"
            >
              <path d="m16 17 5-5-5-5" />
              <path d="M21 12H9" />
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            </svg>
            Logout
          </button>
        </div>
      </nav>
    </header>

    <main id="main-content" class="min-h-0">
      <div id="app" class="h-full"></div>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
